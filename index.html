<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#1a1a2e;color:#e0e0e0;overflow:hidden;height:100vh;display:flex;flex-direction:column}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:linear-gradient(135deg,#16213e,#0f3460);border-bottom:2px solid #e94560;z-index:100;min-height:42px}

.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ecca3;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
#clk{font-weight:700;color:#fff}
#ctlBtn{cursor:pointer;padding:3px 10px;border-radius:4px;background:#e94560;color:#fff;font-size:11px;border:none;margin-left:8px}#ctlBtn:hover{background:#c73e54}

/* === SCENARIO BUTTONS === */
.scenario-bar{display:flex;gap:6px;padding:6px 14px;background:rgba(22,33,62,.95);z-index:99;border-bottom:1px solid rgba(233,69,96,.3);flex-shrink:0}
.s-btn{padding:5px 12px;border:1px solid #333;border-radius:4px;background:#1a1a2e;color:#ccc;font-size:11px;cursor:pointer;transition:.25s}
.s-btn:hover,.s-btn.active{background:#e94560;color:#fff;border-color:#e94560}

/* === MAIN LAYOUT === */
.main-flex{display:flex;flex:1;overflow:hidden;position:relative}
/* LEFT NAV */
.nav-panel{width:200px;overflow-y:auto;padding:10px;background:rgba(22,33,62,.9);border-right:1px solid rgba(255,255,255,.08);z-index:98;scrollbar-width:thin}
.nc-card{margin-bottom:6px;padding:8px;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid transparent;cursor:pointer;transition:.2s}
.nc-card:hover,.nc-card.active{background:rgba(233,69,96,.18);border-color:#e94560}
.nc-name{font-size:11.5px;font-weight:600;color:#fff;margin-bottom:3px}
.nc-phase{font-size:9px;color:#e94560;margin-bottom:2px}
.nc-item{font-size:9.5px;color:#aaa;display:block;line-height:1.5}
/* CENTER 3D */
.view-area{flex:1;position:relative;background:#0d1117;overflow:hidden}
#three-canvas{width:100%;height:100%;display:block}
/* RIGHT DETAIL */
.detail-panel{width:260px;overflow-y:auto;padding:12px;background:rgba(22,33,62,.92);border-left:1px solid rgba(255,255,255,.08);z-index:98}
.dp-title{font-size:13px;font-weight:700;color:#fff;border-left:3px solid #e94560;padding-left:8px;margin-bottom:10px}
.dp-table{width:100%;border-collapse:collapse;font-size:10.5px}
.dp-table td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,.06)}
.dp-table td:first-child{color:#888;width:40%}
.dp-dev-list{list-style:none;padding:0}
.dp-dev-list li{padding:5px 8px;margin-bottom:3px;background:rgba(255,255,255,.04);border-radius:4px;font-size:10px;display:flex;justify-content:space-between;align-items:center}
.dev-status{width:8px;height:8px;border-radius:50%}.dev-on{background:#4ecca3;box-shadow:0 0 5px #4ecca3}.dev-off{background:#666}.dev-warn{background:#f39c12;box-shadow:0 0 5px #f39c12}

.bottom-dash{height:150px;min-height:150px;background:linear-gradient(180deg,rgba(22,33,62,.97),rgba(15,52,96,.97));border-top:1px solid rgba(233,69,96,.35);display:flex;gap:8px;padding:8px 14px;z-index:99;overflow-x:auto;flex-shrink:0}
.gauge-card{min-width:145px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:8px;text-align:center;flex:1;min-width:0}
.gc-label{font-size:9.5px;color:#999;margin-bottom:4px}
.gc-value{font-size:17px;font-weight:800;color:#4ecca3}
.gc-sub{font-size:8.5px;color:#777;margin-top:2px}
.trend-row{display:flex;gap:12px;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);font-size:9.5px;color:#aaa}
.trend-row span{white-space:nowrap}

.info-overlay{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:6px 16px;border-radius:20px;font-size:12px;pointer-events:none;z-index:200;opacity:0;transition:opacity .3s}

/* CONTROL PANEL MODAL */

.modal-overlay.open{display:flex}
.modal-box{background:#1a1a2e;border:1px solid #333;border-radius:10px;width:92%;max-width:1100px;max-height:88vh;overflow-y:auto;padding:20px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.m-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;border-bottom:1px solid #333;padding-bottom:10px}
.m-header h2{font-size:16px;color:#fff}
.m-close{cursor:pointer;background:none;border:none;color:#999;font-size:22px;padding:0 6px}.m-close:hover{color:#e94560}
.m-body{display:flex;gap:18px}
.m-col{flex:1;min-width:0}
.m-col h3{font-size:12px;color:#4ecca3;margin:8px 0 6px;padding-bottom:4px;border-bottom:1px solid rgba(78,204,163,.2)}

.rc-title{font-size:12px;font-weight:700;color:#e94560;margin-bottom:6px}

function onCtlInput(el){document.getElementById('v_'+el.dataset.key).textContent=el.value;computeAndShow();}
function getVal(k){
  const el=document.querySelector(`[data-key="${k}"]`);
  return el?parseFloat(el.value):0;
}
function computeAndShow(){
  const inCod=getVal('in_COD'),inBod=getVal('in_BOD'),inSS=getVal('in_SS'),
        inNh3=getVal('in_NH3'),inTN=getVal('in_TN'),inTP=getVal('in_TP');
  const outCod=getVal('out_COD'),outBod=getVal('out_BOD'),outSS=getVal('out_SS'),
        outNh3=getVal('out_NH3'),outTN=getVal('out_TN'),outTP=getVal('out_TP');
  const vol=getVal('water_vol'),power=getVal('power_kwh');
  const carbonMg=getVal('chem_carbon'),pamA=getVal('chem_pam_a'),
        pac=getVal('chem_pac'),naclo=getVal('chem_naclo'),cpamKgTds=getVal('chem_cpam');
  const wetSludge=getVal('sludge_wet'),moisture=getVal('sludge_moisture');

  // 去除率
  const rCod=removal(inCod,outCod),rBod=removal(inBod,outBod),rSS=removal(inSS,outSS),
        rNh3=removal(inNh3,outNh3),rTN=removal(inTN,outTN),rTP=removal(inTP,outTP);
  function removal(a,b){if(b>=a)return'—';return((1-b/a)*100).toFixed(1)+'%';}
  function rc(v){return v==='—'?'':parseFloat(v);}

  // 吨水电耗
  const kwhPerTon=(power/vol).toFixed(3);

  // 吨水药耗
  const tCarbon_kg=(carbonMg/1000).toFixed(4);
  const tCarbon_L=((carbonMg/CARBON_CONC)*1000).toFixed(4);
  const tPamA=(pamA/1000).toFixed(4);
  const tPac=(pac/1000).toFixed(4);
  const tNaclO=(naclo/1000).toFixed(4);

  // 污泥核算
  const drySludge=wetSludge*(1-moisture/100);
  const cpamDaily=drySludge*cpamKgTds;
  const cpamPerTds=(cpamDaily/drySludge).toFixed(1);

  document.getElementById('colResults').innerHTML=
    `<div class="result-card"><div class="rc-title">① 去除率</div>`+
    `<div class="rm-row"><span>CODcr</span><span class="${rc(rCod)>=90?'rm-ok':rc(rCod)>=75?'rm-warn':'rm-bad'}">${inCod}→${outCod} ${rCod}</span></div>`+
    `<div class="rm-row"><span>BOD₅</span><span class="${rc(rBod)>=90?'rm-ok':rc(rBod)>=75?'rm-warn':'rm-bad'}">${inBod}→${outBod} ${rBod}</span></div>`+
    `<div class="rm-row"><span>SS</span><span class="${rc(rSS)>=90?'rm-ok':rc(rSS)>=75?'rm-warn':'rm-bad'}">${inSS}→${outSS} ${rSS}</span></div>`+
    `<div class="rm-row"><span>NH₃-N</span><span class="${rc(rNh3)>=90?'rm-ok':rc(rNh3)>=75?'rm-warn':'rm-bad'}">${inNh3}→${outNh3} ${rNh3}</span></div>`+
    `<div class="rm-row"><span>TN</span><span class="${rc(rTN)>=85?'rm-ok':rc(rTN)>=70?'rm-warn':'rm-bad'}">${inTN}→${outTN} ${rTN}</span></div>`+
    `<div class="rm-row"><span>TP</span><span class="${rc(rTP)>=90?'rm-ok':rc(rTP)>=80?'rm-warn':'rm-bad'}">${inTP}→${outTP} ${rTP}</span></div>`+
    `</div>`+

    `<div class="result-card"><div class="rc-title">② 吨水电耗</div>`+
    `<div class="rm-row"><span>日处理量</span><span class="rm-ok">${vol.toLocaleString()} m³/d</span></div>`+
    `<div class="rm-row"><span>日用电量</span><span>${power.toLocaleString()} kWh/d</span></div>`+
    `<div class="rm-row"><span><b>吨水电耗</b></span><span class="rm-ok"><b>${kwhPerTon}</b> 度/吨</span></div>`+
    `</div>`+

    `<div class="result-card"><div class="rc-title">③ 吨水药耗</div>`+
    `<div class="rm-row"><span>复合碳源</span><span>${carbonMg} mg/L → ${tCarbon_kg} kg/吨<br><small>(商品液 ${CARBON_CONC/10000}万mg/L → ${tCarbon_L} L/吨)</small></span></div>`+
    `<div class="rm-row"><span>阴离子PAM</span><span>${pamA} mg/L → ${tPamA} kg/吨</span></div>`+
    `<div class="rm-row"><span>PAC</span><span>${pac} mg/L → ${tPac} kg/吨</span></div>`+
    `<div class="rm-row"><span>次氯酸钠</span><span>${naclo} mg/L → ${tNaclO} kg/吨</span></div>`+
    `<div class="rm-row"><span>阳离子PAM</span><span>${cpamKgTds} kg/tDS → 日用量 ${cpamDaily.toFixed(1)} kg/d</span></div>`+
    `</div>`+

function createStructureModel(group,sd){
  const wp=pxToWorld(sd.cx,sd.cy);
  const pos=new THREE.Vector3(wp.x,0,wp.z);

  if(sd.type==='tank_rect'){
    createRectTank(group,sd.w,sd.tankD||6,sd.color,pos);
  }else if(sd.type==='tank_circular'){
    createCircularTank((sd.r||10)*2,sd.tankD||5,sd.color,pos);
  }else if(sd.type==='building'){
    createBuilding(group,sd.w,sd.h,sd.floorH||8,sd.color,pos);
  }else if(sd.type==='filter'){
    createFilterTank(group,sd.w,sd.h,sd.tankD||4,sd.color,pos);
  }else if(sd.type==='process'){
    createProcessUnit(group,sd.w,sd.h,sd.tankD||6,sd.color,pos);
  }else if(sd.type==='well'){
    createWell(group,sd.w,sd.h,sd.tankD||3,sd.color,pos);
  }else{
    createRectTank(group,sd.w,sd.tankD||5,sd.color,pos);
  }
  group.position.copy(pos);
}

// --- 几何体创建函数 ---
function createRectTank(group,w,d,col,pos){
  const h=d||6;
  // 池体
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshStandardMaterial({color:col,transparent:true,opacity:0.78,roughness:0.3,metalness:0.1});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.y=h/2-0.5;
  mesh.castShadow=true;mesh.receiveShadow=true;
  group.add(mesh);
  // 边框
  const edges=new THREE.EdgesGeometry(geo);
  group.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x88ccff,linewidth:1})));
  // 水面
  if(h>2){
    const waterGeo=new THREE.PlaneGeometry(w*0.92,d*0.92);
    const waterMat=new THREE.MeshStandardMaterial({color:0x1e90ff,transparent:true,opacity:0.45,roughness:0.1,metalness:0.3});
    const water=new THREE.Mesh(waterGeo,waterMat);
    water.rotation.x=-Math.PI/2;
    water.position.y=h-0.3;
    group.add(water);
  }
}
function createCircularTank(dia,d,col,pos){
  const r=dia/2,h=d||5;
  const geo=new THREE.CylinderGeometry(r,r,h,32);
  const mat=new THREE.MeshStandardMaterial({color:col,transparent:true,opacity:0.78,roughness:0.3});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.y=h/2-0.5;mesh.castShadow=true;
  group.add(mesh);
  const edges=new THREE.EdgesGeometry(geo);
  group.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x88ccff})));
  if(h>2){
    const wGeo=new THREE.CircleGeometry(r*0.9,32);
    const wMat=new THREE.MeshStandardMaterial({color:0x1e90ff,transparent:true,opacity:0.45,side:THREE.DoubleSide});
    const water=new THREE.Mesh(wGeo,wMat);water.rotation.x=-Math.PI/2;water.position.y=h-0.3;group.add(water);
  }
}
function createBuilding(group,w,fh,col,pos){
  // 主体
  const bGeo=new THREE.BoxGeometry(w,fh,w*0.75);
  const bMat=new THREE.MeshStandardMaterial({color:col,roughness:0.7,metalness:0.05});
  const bMesh=new THREE.Mesh(bGeo,bMat);bMesh.position.y=fh/2;bMesh.castShadow=true;bMesh.receiveShadow=true;
  group.add(bMesh);
  const edges=new THREE.EdgesGeometry(bGeo);
  group.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x666})));
  // 屋顶
  const roofGeo=new THREE.BoxGeometry(w+1,0.5,w*0.75+1);
  const roofMat=new THREE.MeshStandardMaterial({color:0x8b4513,roughness:0.8});
  const roof=new THREE.Mesh(roofGeo,roofMat);roof.position.y=fh+0.25;
  group.add(roof);
  // 窗户装饰
  const winSize=Math.min(fh*0.15,1.2);
  for(let floor=1;floor<=Math.floor(fh/3.5);floor++){
    const wy=floor*3.5-winSize/2;
    [-1,1].forEach(side=>{
      const wGeo=new THREE.PlaneGeometry(w*0.25,winSize);
      const wMat=new THREE.MeshBasicMaterial({color:0x87ceeb,transparent:true,opacity:0.5,side:THREE.DoubleSide});
      const win=new THREE.Mesh(wGeo,wMat);
      win.position.set(side*(w*0.38),wy,w*0.76/2+0.01);
      group.add(win);
    });
  }
}
function createFilterTank(group,w,d,tankD,col,pos){
  const h=tankD||4;
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshStandardMaterial({color:col,transparent:true,opacity:0.75,roughness:0.3});
  const mesh=new THREE.Mesh(geo,mat);mesh.position.y=h/2-0.5;mesh.castShadow=true;
  group.add(mesh);
  const edges=new THREE.EdgesGeometry(geo);
  group.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0xaaddff})));
  // V型滤板示意
  const vCount=Math.floor(d/4);
  for(let i=0;i<vCount;i++){
    const vGeo=new THREE.ConeGeometry(0.4,h*0.7,4);
    const vMat=new THREE.MeshStandardMaterial({color:0xcccccc});
    const vMesh=new THREE.Mesh(vGeo,vMat);
    vMesh.position.set(-w*0.35+i*(w*0.7/vCount),h*0.35-h/2+0.5,-d*0.35);
    group.add(vMesh);
  }
}
function createProcessUnit(group,w,d,tankD,col,pos){
  const h=tankD||6;
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshStandardMaterial({color:col,transparent:true,opacity:0.72,roughness:0.35});
  const mesh=new THREE.Mesh(geo,mat);mesh.position.y=h/2-0.5;mesh.castShadow=true;mesh.receiveShadow=true;
  group.add(mesh);
  const edges=new THREE.EdgesGeometry(geo);
  group.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x88bbdd})));
  // 格栅/设备示意
  const railGeo=new THREE.BoxGeometry(Math.max(w*0.1,0.8),h*0.6,0.3);
  const railMat=new THREE.MeshStandardMaterial({color:0x999999,metalness:0.6});
  const rail=new THREE.Mesh(railGeo,railMat);rail.position.set(0,h*0.3-d*0.35,0);group.add(rail);
}
function createWell(group,w,d,tankD,col,pos){
  const h=tankD||3;
  const geo=new THREE.BoxGeometry(w,h,d);
  const mat=new THREE.MeshStandardMaterial({color:col,transparent:true,opacity:0.7,roughness:0.4});
  const mesh=new THREE.Mesh(geo,mat);mesh.position.y=h/2-0.5;group.add(mesh);
  const edges=new THREE.EdgesGeometry(geo);
  group.add(new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x77aacc})));
}

function createLabel(text,pos,type){
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');canvas.width=256;canvas.height=64;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  // rounded rect (compatible with older Canvas 2D)
  var r=8;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(256-r,0);ctx.quadraticCurveTo(256,0,256,r);
  ctx.lineTo(256,64-r);ctx.quadraticCurveTo(256,64,256-r,64);
  ctx.lineTo(r,64);ctx.quadraticCurveTo(0,64,0,64-r);
  ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#ffffff';ctx.font='bold 22px Microsoft YaHei';ctx.textAlign='center';ctx.fillText(text,128,40);
  const tex=new THREE.CanvasTexture(canvas);
  const sprMat=new THREE.SpriteMaterial({map:tex,depthTest:false});
  const spr=new THREE.Sprite(sprMat);spr.scale.set(12,3,1);
  spr.position.set(pos.x,(type==='building'?10:7),pos.z+3);
  scene.add(spr);
}

function addTrees(){
  const treePos=[[5,5],[160,8],[8,120],[155,125],[270,10],[275,130],[130,-8],[-5,65]];
  treePos.forEach(p=>{
    const tg=new THREE.Group();
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.5,2.5,8),new THREE.MeshStandardMaterial({color:0x8b4513}));
    trunk.position.y=1.25;tg.add(trunk);
    const crown=new THREE.Mesh(new THREE.SphereGeometry(1.8,8,8),new THREE.MeshStandardMaterial({color:0x228b22}));
    crown.position.y=3.5;tg.add(crown);
    tg.position.set(p[0],0,p[1]);tg.scale.setScalar(0.8);
    scene.add(tg);
  });
}

// ---- 动画循环 ----
function animate(){
  requestAnimationFrame(animate);
  try{controls.update();}catch(e){}
  renderer.render(scene,camera);
}

function onResize(){
  const rect=document.getElementById('three-canvas').parentElement.getBoundingClientRect();
  camera.aspect=rect.width/rect.height;camera.updateProjectionMatrix();
  renderer.setSize(rect.width,rect.height);
}

// ---- 点击检测 ----
function onClickCanvas(e){
  const rect=e.target.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(structures,true);
  if(hits.length>0){
    let obj=hits[0].object;
    while(obj.parent&&!obj.userData.id)obj=obj.parent;
    if(obj.userData&&obj.userData.sd){
      showDetail(obj.userData.sd);
      highlightNav(obj.userData.id);
    }
  }
}

// ---- 导航构建 ----
function buildNav(){
  const p=document.getElementById('navPanel');
  let html='';
  for(const fid of flowOrder){
    const sd=STRUCT_DATA.find(s=>s.id===fid);
    if(!sd)continue;
    const phaseTag=`<span class="nc-phase">${sd.phase}</span>`;
    const specsHtml=[];
    if(sd.specs.size)specsHtml.push(`<span class="nc-item">规格:${sd.specs.size}</span>`);
    if(sd.specs.HRT&&sd.specs.HRT!=='-')specsHtml.push(`<span class="nc-item">HRT:${sd.specs.HRT}</span>`);
    if(sd.specs.vol&&sd.specs.vol!=='-')specsHtml.push(`<span class="nc-item">容积:${sd.specs.vol}</span>`);
    html+=`<div class="nc-card" data-id="${sd.id}" onclick="selectNav('${sd.id}')">
      <div class="nc-name">${sd.name}</div>${phaseTag}${specsHtml.join('')}
    </div>`;
  }
  p.innerHTML=html;
}

function selectNav(id){
  const sd=STRUCT_DATA.find(s=>s.id===id);
  if(!sd)return;
  showDetail(sd);
  highlightNav(id);
  // 相机聚焦
  const wp=pxToWorld(sd.cx,sd.cy);
  const targetPos=new THREE.Vector3(wp.x,0,wp.z);
  // 简单的相机移动
  const offset=new THREE.Vector3(30,25,30);
  camera.position.copy(targetPos).add(offset);
  controls.target.copy(targetPos);
}

function showDetail(sd){
  document.getElementById('dpTitle').textContent=sd.name+' ('+sd.phase+')';
  let html=`<table class="dp-table"><tbody>`;
  html+=`<tr><td>构筑物编号</td><td><strong>${sd.id}</strong></td></tr>`;
  html+=`<tr><td>功能角色</td><td>${sd.specs.role||'—'}</td></tr>`;
  html+=`<tr><td>尺寸规格</td><td>${sd.specs.size||'—'}</td></tr>`;
  if(sd.specs.HRT&&sd.specs.HRT!=='-')html+=`<tr><td>水力停留时间</td><td><strong>${sd.specs.HRT}</strong></td></tr>`;
  if(sd.specs.vol&&sd.specs.vol!=='-')html+=`<tr><td>有效容积</td><td>${sd.specs.vol} m³</td></tr>`;
  if(sd.params){
    for(const[k,v]of Object.entries(sd.params))html+=`<tr><td>${k}</td><td><strong>${v}</strong></td></tr>`;
  }
  html+=`</tbody></table>`;

  if(sd.devices&&sd.devices.length>0){
    html+='<h4 style="font-size:11px;color:#4ecca3;margin:10px 0 6px">设备清单 ('+sd.devices.length+' 台)</h4>';
    html+='<ul class="dp-dev-list">';
    sd.devices.forEach(d=>{
      const sc=d.status===1?'dev-on':d.status===0?'dev-off':'dev-warn';
      html+=`<li><span>${d.name}<br><small style="color:#888">${d.model}</small></span><span class="dev-status ${sc}"></span></li>`;
    });
    html+='</ul>';
  }
  document.getElementById('dpBody').innerHTML=html;
}

function highlightNav(id){
  document.querySelectorAll('.nc-card').forEach(c=>{
    c.classList.toggle('active',c.dataset.id===id);
  });
}

// ---- 仪表盘 ----
function buildDashboard(){
  const indicators=[
    {key:'CODcr',unit:'mg/L',inKey:'in_COD',outKey:'out_COD',color:'#e74c3c'},
    {key:'BOD₅',unit:'mg/L',inKey:'in_BOD',outKey:'out_BOD',color:'#3498db'},
    {key:'SS',unit:'mg/L',inKey:'in_SS',outKey:'out_SS',color:'#2ecc71'},
    {key:'NH₃-N',unit:'mg/L',inKey:'in_NH3',outKey:'out_NH3',color:'#9b59b6'},
    {key:'TN',unit:'mg/L',inKey:'in_TN',outKey:'out_TN',color:'#f39c12'},
    {key:'TP',unit:'mg/L',inKey:'in_TP',outKey:'out_TP',color:'#1abc9c'},
  ];
  const dq=activeScenario!=='custom'?scenarioPresets[activeScenario]:null;
  const db=document.getElementById('dashBoard');
  let cardsHTML='',trendHTML='';
  indicators.forEach(ind=>{
    const inVal=dq?dq.influent[ind.key]:getVal(ind.inKey)||designData.influent[ind.key];
    const outVal=dq?dq.effluent[ind.key]:getVal(ind.outKey)||designData.effluent[ind.key];
    const pct=outVal>=inVal?'—':(((1-outVal/inVal)*100)).toFixed(1);
    cardsHTML+=`<div class="gauge-card"><div class="gc-label">${ind.key} (${ind.unit})</div>
      <div class="gc-value" style="color:${ind.color}">${outVal}</div>
      <div class="gc-sub">进水:${inVal} | 去除率:${isNaN(pct)?pct:pct+'%'}</div></div>`;
  });

  const vol=dq?dq.vol:getVal('water_vol')||designData.dailyVol;
  const load=dq?(vol/designData.dailyVol*designData.loadRate).toFixed(0):designData.loadRate;
  const power=dq?dq.power:getVal('power_kwh')||designData.powerKwhPerTon*designData.dailyVol;
  const kwhT=dq?(power/vol).toFixed(3):getVal('water_vol')?getVal('power_kwh')/getVal('water_vol'):designData.powerKwhPerTon;
  const sludge=dq?dq.sludge:getVal('sludge_wet')||designData.sludgeProd_t_d;
  trendHTML=`<div class="trend-row">
    <span>📊 日处理:<b style="color:#4ecca3">${Number(vol).toLocaleString()}m³</b></span>
    <span>负荷率:<b>${load}%</b></span>
    <span>⚡ 吨水电耗:<b>${kwhT}度/t</b></span>
    <span>🗑 污泥产量:<b>${sludge}t/d</b></span></div>`;

  db.innerHTML=cardsHTML+trendHTML;
}

// 从调控面板同步到仪表盘
window.updateDashFromPanel=function(p){/* already computed via buildDashboard */};

// ---- 情景切换 ----
function setupScenarios(){
  const bar=document.getElementById('scenarios');
  let btns='';
  for(const[k,s]of Object.entries(scenarioPresets)){
    btns+=`<button class="s-btn${k===activeScenario?' active':''}" onclick="switchScenario('${k}')">${s.label}</button>`;
  }
  bar.innerHTML=btns;
}
function switchScenario(key){
  activeScenario=key;
  document.querySelectorAll('.s-btn').forEach((b,i)=>{
    const keys=Object.keys(scenarioPresets);
    b.classList.toggle('active',keys[i]===key);
  });
  // 同步调控面板输入框
  const s=scenarioPresets[key];
  if(s){
    setCtlVal('in_COD',s.influent.CODcr);setCtlVal('in_BOD',s.influent.BOD5);
    setCtlVal('in_SS',s.influent.SS);setCtlVal('in_NH3',s.influent.NH3_N);
    setCtlVal('in_TN',s.influent.TN);setCtlVal('in_TP',s.influent.TP);
    setCtlVal('out_COD',s.effluent.CODcr);setCtlVal('out_BOD',s.effluent.BOD5);
    setCtlVal('out_SS',s.effluent.SS);setCtlVal('out_NH3',s.effluent.NH3_N);
    setCtlVal('out_TN',s.effluent.TN);setCtlVal('out_TP',s.effluent.TP);
    setCtlVal('water_vol',s.vol);setCtlVal('power_kwh',s.power);
    // 更新显示
    for(const g of ctlConfig)for(const f of g.fields){
      const el=document.querySelector(`[data-key="${f.key}"]`);
      if(el){el.value=s[f.key]!==undefined?s[f.key]:f.val;document.getElementById('v_'+f.key).textContent=el.value;}
    }
    computeAndShow();
  }
  buildDashboard();
}
function setCtlVal(key,val){
  const el=document.querySelector(`[data-key="${key}"]`);
  if(el){el.value=val;const ve=document.getElementById('v_'+key);if(ve)ve.textContent=val;}
}

// ---- 时钟 ----
function updateClock(){
  const now=new Date();
  document.getElementById('clk').textContent=now.toLocaleTimeString('zh-CN',{hour12:false})+' | '+now.toLocaleDateString('zh-CN');
}

// ---- 信息浮窗 ----
function showInfo(text,x,y){
  infoEl.textContent=text;infoEl.style.opacity='1';
  setTimeout(()=>{infoEl.style.opacity='0';},2500);
}

// ============================================================
//  初始化入口
// ============================================================
init3D();
buildNav();
buildDashboard();
setupScenarios();
buildControls();
setInterval(updateClock,1000);
updateClock();
</script>
